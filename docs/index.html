<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CasaGG — Download</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0E0E11;
      color: #E8E8F0;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(255,107,26,0.13) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrap {
      text-align: center;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      position: relative;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 72px;
      line-height: 1;
      background: linear-gradient(135deg, #FF6B1A, #FF9A5C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 16px;
      color: #666;
      letter-spacing: 0.3px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 18px 48px;
      background: linear-gradient(135deg, #FF6B1A, #FF8A42);
      border-radius: 14px;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 1px;
      text-decoration: none;
      box-shadow: 0 8px 40px rgba(255,107,26,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 50px rgba(255,107,26,0.55);
    }

    .meta {
      font-size: 12px;
      color: #444;
    }

    .meta span { color: #666; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">CASA.GG</div>
    <div class="tagline">Your AI gaming assistant — ask anything, hands free.</div>

    <a id="dl-btn" href="https://github.com/oofem-cmd/Casa.GG.github.io/releases/latest" class="btn">
      ⬇&nbsp; Download for Windows
    </a>

    <div class="meta">Free &nbsp;·&nbsp; Windows 10/11 &nbsp;·&nbsp; <span id="ver">Auto-updating</span></div>
  </div>

  <script>
    fetch('https://api.github.com/repos/oofem-cmd/Casa.GG.github.io/releases/latest')
      .then(r => r.json())
      .then(data => {
        const exe = (data.assets || []).find(a => a.name.endsWith('.exe'));
        if (exe) document.getElementById('dl-btn').href = exe.browser_download_url;
        const v = (data.tag_name || '').replace(/^v/, '');
        if (v) document.getElementById('ver').textContent = 'v' + v;
      }).catch(() => {});
  </script>
</body>
</html>
