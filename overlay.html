<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CasaGG Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      background: rgba(18, 20, 28, 0.93);
      border: 1px solid rgba(255, 107, 26, 0.45);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 70px rgba(0,0,0,0.65), 0 0 32px rgba(255,107,26,0.07);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    /* Title bar — draggable */
    .titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 13px 8px;
      border-bottom: 1px solid rgba(255,107,26,0.15);
      flex-shrink: 0;
      user-select: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .logo-img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      border-radius: 4px;
    }

    .logo-text {
      font-weight: 800;
      font-size: 13px;
      color: #FF6B1A;
      letter-spacing: 1px;
    }

    .logo-text span { color: #e8eaf0; }

    .live-badge {
      font-size: 8px;
      background: rgba(255,107,26,0.15);
      color: #FF6B1A;
      border: 1px solid rgba(255,107,26,0.3);
      border-radius: 20px;
      padding: 1px 6px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .titlebar-actions {
      display: flex;
      gap: 5px;
      -webkit-app-region: no-drag;
    }

    .icon-btn {
      width: 21px;
      height: 21px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #888;
      cursor: pointer;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: rgba(255,107,26,0.2); color: #FF6B1A; }

    /* Answer area */
    .answer-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px 13px 6px;
      font-size: 12.5px;
      color: #c8cad8;
      line-height: 1.7;
    }

    .answer-area::-webkit-scrollbar { width: 4px; }
    .answer-area::-webkit-scrollbar-thumb { background: rgba(255,107,26,0.3); border-radius: 2px; }

    .placeholder { color: #444; font-style: italic; }

    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      padding: 2px 10px;
      background: rgba(255,107,26,0.08);
      border: 1px solid rgba(255,107,26,0.25);
      border-radius: 20px;
      color: #FF6B1A;
      font-size: 10px;
      text-decoration: none;
      cursor: pointer;
    }

    /* Input row */
    .input-row {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 7px;
      padding: 8px 10px 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .q-input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 7px 11px;
      color: #e8eaf0;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .q-input:focus { border-color: rgba(255,107,26,0.5); }
    .q-input::placeholder { color: #555; }

    .ask-btn {
      padding: 7px 13px;
      background: #FF6B1A;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.8px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .ask-btn:hover:not(:disabled) { opacity: 0.88; }

    /* Status / speaking indicator */
    .status-bar {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 4px 13px;
      background: rgba(255,107,26,0.08);
      border-top: 1px solid rgba(255,107,26,0.15);
      font-size: 10px;
      color: #FF6B1A;
      font-weight: 600;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .status-bar.visible { display: flex; }

    .wave-bars {
      display: flex;
      gap: 2px;
      align-items: center;
    }
    .wave-bar {
      width: 3px;
      background: #FF6B1A;
      border-radius: 2px;
      animation: wave 0.7s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { height: 3px; }
      50%       { height: 12px; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="titlebar">
      <div class="brand">
        <img class="logo-img" src="./assets/casaorangegg.png" alt="Casa.GG" onerror="this.style.display='none'" />
        <span class="logo-text">Casa<span>.GG</span></span>
        <span class="live-badge">LIVE</span>
      </div>
      <div class="titlebar-actions">
        <button class="icon-btn" title="Close overlay" onclick="closeOverlay()">✕</button>
      </div>
    </div>

    <div class="answer-area" id="answer-area">
      <span class="placeholder">Say "Hey Casa" or ask below…</span>
    </div>

    <div class="status-bar" id="status-bar">
      <div class="wave-bars">
        <div class="wave-bar" style="animation-delay:0s"></div>
        <div class="wave-bar" style="animation-delay:0.12s"></div>
        <div class="wave-bar" style="animation-delay:0.24s"></div>
        <div class="wave-bar" style="animation-delay:0.36s"></div>
        <div class="wave-bar" style="animation-delay:0.48s"></div>
      </div>
      <span id="status-text">Thinking…</span>
    </div>

    <div class="input-row">
      <input class="q-input" type="text" id="q-input" placeholder="Quick question…" autocomplete="off" />
      <button class="ask-btn" id="ask-btn" onclick="sendQuestion()">ASK</button>
    </div>

  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const path            = require('path');

    const answerArea = document.getElementById('answer-area');
    const statusBar  = document.getElementById('status-bar');
    const statusText = document.getElementById('status-text');
    const qInput     = document.getElementById('q-input');
    const askBtn     = document.getElementById('ask-btn');

    // ── Receive answer from main window ─────────────────────────────────────
    ipcRenderer.on('new-answer', (_e, answer) => {
      hideStatus();
      renderAnswer(answer);
    });

    // ── Show/hide thinking status ────────────────────────────────────────────
    ipcRenderer.on('overlay-thinking', (_e, msg) => {
      statusText.textContent = msg || 'Thinking…';
      statusBar.classList.add('visible');
    });

    function hideStatus() {
      statusBar.classList.remove('visible');
    }

    // ── Render answer text (light markdown parsing) ──────────────────────────
    function renderAnswer(text) {
      answerArea.innerHTML = '';

      const lines = text.split('\n');
      lines.forEach(line => {
        if (!line.trim()) {
          answerArea.appendChild(document.createElement('br'));
          return;
        }

        const el = document.createElement('div');
        el.style.marginBottom = '3px';

        if (/\[Source:/.test(line)) {
          const src = (line.match(/\[Source:\s*(.*?)\]/) || [])[1] || '#';
          const a = document.createElement('a');
          a.className = 'source-link';
          a.href = '#';
          a.textContent = '🔗 ' + src.replace(/^https?:\/\/(www\.)?/, '').substring(0, 60);
          a.onclick = (e) => { e.preventDefault(); require('electron').shell.openExternal(src); };
          answerArea.appendChild(a);
          return;
        }

        if (/^##?\s/.test(line)) {
          el.style.color = '#FF6B1A';
          el.style.fontWeight = '700';
          el.style.fontSize = '13px';
          el.style.marginTop = '8px';
          el.textContent = line.replace(/^##?\s/, '');
        } else if (/^[-•]\s/.test(line)) {
          el.style.paddingLeft = '12px';
          el.textContent = '▸ ' + line.replace(/^[-•]\s/, '');
        } else if (/^💡|Pro Tip/.test(line)) {
          el.style.padding = '6px 10px';
          el.style.background = 'rgba(255,107,26,0.08)';
          el.style.borderLeft = '3px solid #FF6B1A';
          el.style.borderRadius = '0 6px 6px 0';
          el.style.color = '#aaa';
          el.style.fontSize = '11.5px';
          el.style.marginTop = '6px';
          el.textContent = line;
        } else {
          el.textContent = line.replace(/\*\*/g, '').replace(/`/g, '');
        }

        answerArea.appendChild(el);
      });

      // Scroll to bottom
      answerArea.scrollTop = answerArea.scrollHeight;
    }

    // ── Send question to main window ─────────────────────────────────────────
    function sendQuestion() {
      const q = qInput.value.trim();
      if (!q) return;

      askBtn.textContent = '…';
      askBtn.disabled    = true;
      statusText.textContent = 'Asking Casa…';
      statusBar.classList.add('visible');

      ipcRenderer.send('overlay-ask', q);
      qInput.value = '';

      // Re-enable after timeout (main window will send back the answer)
      setTimeout(() => {
        askBtn.textContent = 'ASK';
        askBtn.disabled    = false;
      }, 15000);
    }

    function closeOverlay() {
      ipcRenderer.send('hide-overlay');
    }

    // ── Keyboard ─────────────────────────────────────────────────────────────
    qInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendQuestion();
    });
  </script>
</body>
</html>
