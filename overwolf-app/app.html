<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasaGG — Gaming Assistant</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100vh; overflow: hidden; }

    @keyframes logoDrop {
      0%   { transform: translateY(-340px); opacity: 0; }
      55%  { transform: translateY(0px);    opacity: 1; }
      68%  { transform: translateY(-28px);  opacity: 1; }
      80%  { transform: translateY(0px);    opacity: 1; }
      88%  { transform: translateY(-10px);  opacity: 1; }
      100% { transform: translateY(0px);    opacity: 1; }
    }
    @keyframes introFadeOut {
      0%   { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }
    .intro-screen {
      position: fixed; inset: 0; z-index: 99999;
      background: #1E2028;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      pointer-events: none;
    }
    .intro-screen.fading { animation: introFadeOut 0.5s ease forwards; }
    .intro-logo { animation: logoDrop 1.35s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .intro-logo img { width: 130px; height: 130px; object-fit: contain; filter: drop-shadow(0 12px 40px rgba(255,107,26,0.45)); }
    .intro-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 36px; letter-spacing: 2px;
      color: #FF6B1A; opacity: 0;
      animation: introFadeOut 0.01s 1.6s reverse forwards;
    }
    .intro-title span { color: #e8eaf0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Overwolf helpers ──────────────────────────────────────────────
    const _ow = window.overwolf || null;

    const getBg = () => {
      try { return _ow?.windows.getMainWindow(); } catch { return null; }
    };

    const assetPath = name => `./assets/${name}`;

    // ── Settings persistence ──────────────────────────────────────────
    const SETTINGS_KEY = 'casagg-settings-ow';
    const APIKEY_KEY   = 'casagg-apikey-ow';

    const loadSettings = (defaults) => {
      try {
        const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
        const k = localStorage.getItem(APIKEY_KEY) || '';
        return { ...defaults, ...s, apiKey: k || s.apiKey || '' };
      } catch { return { ...defaults }; }
    };

    const saveSettings = (settings) => {
      try {
        const { apiKey, ...rest } = settings;
        localStorage.setItem(SETTINGS_KEY, JSON.stringify(rest));
        if (apiKey) localStorage.setItem(APIKEY_KEY, apiKey);
      } catch {}
    };

    // ── Themes ────────────────────────────────────────────────────────
    const THEMES = {
      light: {
        bgApp:'#EDEEF0', bgPanel:'#F5F6F7', bgCard:'#FFFFFF', bgInput:'#E8E9EC',
        bgHover:'#E2E4E8', bgSidebar:'#F5F6F7', bgModal:'rgba(0,0,0,0.45)',
        border:'#DDDFE3', borderFocus:'#FF6B1A',
        textPrimary:'#1A1B1E', textSecond:'#6B7280', textMuted:'#9CA3AF', textBright:'#0F1013',
        orange:'#FF6B1A', orangeSoft:'rgba(255,107,26,0.08)', orangeBorder:'rgba(255,107,26,0.22)',
        success:'#22C55E', danger:'#EF4444',
        shadow:'0 1px 4px rgba(0,0,0,0.06)', shadowCard:'0 2px 10px rgba(0,0,0,0.05)',
        shadowOrange:'0 4px 18px rgba(255,107,26,0.22)',
      },
      dark: {
        bgApp:'#1E2028', bgPanel:'#252830', bgCard:'#2D3140', bgInput:'#1A1C23',
        bgHover:'#343848', bgSidebar:'#252830', bgModal:'rgba(0,0,0,0.65)',
        border:'#383D4E', borderFocus:'#FF6B1A',
        textPrimary:'#E8EAF0', textSecond:'#9AA0B8', textMuted:'#5A6080', textBright:'#F2F4FF',
        orange:'#FF6B1A', orangeSoft:'rgba(255,107,26,0.12)', orangeBorder:'rgba(255,107,26,0.3)',
        success:'#22C55E', danger:'#EF4444',
        shadow:'0 1px 4px rgba(0,0,0,0.3)', shadowCard:'0 2px 10px rgba(0,0,0,0.3)',
        shadowOrange:'0 4px 18px rgba(255,107,26,0.25)',
      },
    };

    // ── Helpers ───────────────────────────────────────────────────────
    const getTZ   = () => { try { return Intl.DateTimeFormat().resolvedOptions().timeZone; } catch { return 'UTC'; } };
    const getTime = () => new Date().toLocaleString('en-US', { timeZone:getTZ(), weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });

    const doSpeak = (text, settings, onEnd) => {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/\[Source:[^\]]*\]/g,'').replace(/#+\s/g,'').replace(/[*_`]/g,'').substring(0, 900);
      const utt = new SpeechSynthesisUtterance(clean);
      utt.rate   = settings.speakRate ?? 1.0;
      utt.volume = (settings.volume ?? 80) / 100;
      const voices = window.speechSynthesis.getVoices();
      const pick = settings.voiceName
        ? voices.find(v => v.name === settings.voiceName)
        : voices.find(v => settings.voiceGender === 'male'
            ? /male|david|mark|james|guy/i.test(v.name)
            : /female|zira|samantha|karen|moira|aria/i.test(v.name)) || voices[0];
      if (pick) utt.voice = pick;
      utt.onend = onEnd ?? null;
      window.speechSynthesis.speak(utt);
    };
    const stopSpeak = () => window.speechSynthesis?.cancel();

    // ── DuckDuckGo instant-answers web search ─────────────────────────
    const webSearch = async (query) => {
      try {
        const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
        const res  = await fetch(url);
        const data = await res.json();
        const results = [];
        if (data.AbstractText) {
          results.push({ title: data.Heading || query, snippet: data.AbstractText, url: data.AbstractURL || '#' });
        }
        (data.RelatedTopics || []).slice(0, 3).forEach(t => {
          if (t.Text) results.push({ title: t.Text.slice(0, 60), snippet: t.Text, url: t.FirstURL || '#' });
        });
        return results.slice(0, 4);
      } catch { return []; }
    };

    // ── System prompt ─────────────────────────────────────────────────
    const buildSystemPrompt = (username, tz, game, searchResults, liveEvents) => {
      let p = `You are CasaGG, the ultimate video game assistant running as an Overwolf in-game overlay. Talk like a knowledgeable, enthusiastic gaming buddy — friendly, casual, accurate.
${username ? `The player's name is ${username}. Use it naturally every few responses.` : ''}
Player's timezone: ${tz}. Current date/time: ${getTime()}.
${game ? `Current game detected by Overwolf: **${game}**. Tailor all answers to this game unless asked otherwise.` : ''}
Expertise: boss strategies, quest walkthroughs, collectibles/secrets, lore, builds/loadouts, puzzles, live service events, crafting, map locations.
Style: concise but complete. Use ## headers for multi-part answers. Bullets/numbered steps for lists. End with 💡 Pro Tip when useful. Cite sources as [Source: URL].
For live service events, factor in the player's timezone (${tz}).`;
      if (liveEvents && liveEvents.length > 0) {
        p += `\n\nLIVE GAME DATA (from Overwolf game events, current session):\n${liveEvents.map(e => `- ${e.name}: ${JSON.stringify(e.data)}`).join('\n')}\nUse this data to give real-time context-aware answers.`;
      }
      if (searchResults && searchResults.length > 0) {
        p += `\n\nWEB SEARCH CONTEXT:\n`;
        searchResults.forEach((r, i) => { p += `\n[${i+1}] ${r.title}\n${r.snippet}\nURL: ${r.url}\n`; });
        p += `\nCite the most relevant source(s) as [Source: URL].`;
      }
      return p;
    };

    const QUICK = [
      { icon:'⚔️', label:'Boss Strategy'  },
      { icon:'🗺️', label:'Next Objective' },
      { icon:'🏆', label:'Collectibles'   },
      { icon:'🛡️', label:'Best Build'     },
      { icon:'📖', label:'Character Lore' },
      { icon:'🧩', label:'Puzzle Help'    },
      { icon:'🎉', label:'Current Events' },
      { icon:'💎', label:'Rare Loot'      },
    ];

    // ── Logo intro ────────────────────────────────────────────────────
    const LogoIntro = ({ onDone }) => {
      const [fading, setFading] = useState(false);
      const doneRef = useRef(onDone);
      doneRef.current = onDone;
      useEffect(() => {
        const sfxT = setTimeout(() => {
          try { const a = new Audio(assetPath('casaplop.mp3')); a.volume=0.9; a.play().catch(()=>{}); } catch {}
        }, 740);
        const fadeT = setTimeout(() => setFading(true), 1800);
        const doneT = setTimeout(() => doneRef.current(), 2350);
        return () => { clearTimeout(sfxT); clearTimeout(fadeT); clearTimeout(doneT); };
      }, []);
      return (
        <div className={`intro-screen${fading ? ' fading' : ''}`}>
          <div className="intro-logo"><img src={assetPath('casaorangegg.png')} alt="CasaGG" /></div>
          <div className="intro-title" style={{ opacity: fading ? 0 : 1, transition: 'opacity 0.4s 0.2s' }}>Casa<span>.GG</span></div>
        </div>
      );
    };

    // ── Formatted message renderer ────────────────────────────────────
    const Formatted = ({ text, t }) => (
      <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
        {text.split('\n').map((line, i) => {
          if (!line.trim()) return <div key={i} style={{ height:5 }} />;
          if (/^##\s/.test(line)) return <div key={i} style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:14, color:t.orange, marginTop:8, letterSpacing:0.5 }}>{line.replace(/^##\s/,'')}</div>;
          if (/^#\s/.test(line))  return <div key={i} style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:16, color:t.orange, marginTop:8 }}>{line.replace(/^#\s/,'')}</div>;
          if (/^[-•]\s/.test(line)) return <div key={i} style={{ display:'flex', gap:8, alignItems:'flex-start', paddingLeft:4 }}><span style={{ color:t.orange, flexShrink:0, marginTop:3, fontSize:10 }}>▸</span><span>{line.replace(/^[-•]\s/,'')}</span></div>;
          if (/^\d+\.\s/.test(line)) return <div key={i} style={{ display:'flex', gap:8, alignItems:'flex-start', paddingLeft:4 }}><span style={{ color:t.orange, flexShrink:0, fontWeight:700, minWidth:20, fontSize:11 }}>{line.match(/^(\d+)\./)?.[1]}.</span><span>{line.replace(/^\d+\.\s/,'')}</span></div>;
          if (/\[Source:/.test(line)) {
            const src = line.match(/\[Source:\s*(.*?)\]/)?.[1] ?? '#';
            return <a key={i} href={src.startsWith('http') ? src : '#'} target="_blank" rel="noreferrer"
              style={{ display:'inline-flex', alignItems:'center', gap:5, marginTop:6, padding:'3px 12px', background:t.orangeSoft, border:`1px solid ${t.orangeBorder}`, borderRadius:20, color:t.orange, fontSize:11, fontFamily:"'DM Mono',monospace", textDecoration:'none', width:'fit-content' }}>
              🔗 {src.replace(/^https?:\/\/(www\.)?/,'').substring(0,50)}
            </a>;
          }
          if (/Pro Tip|💡/.test(line)) return <div key={i} style={{ marginTop:8, padding:'8px 12px', background:t.orangeSoft, borderLeft:`3px solid ${t.orange}`, borderRadius:'0 8px 8px 0', fontSize:13, color:t.textSecond }}>{line}</div>;
          return <span key={i} style={{ lineHeight:1.75 }}>{line.replace(/\*\*/g,'').replace(/`/g,'')}</span>;
        })}
      </div>
    );

    // ── Game Picker Modal (Overwolf auto-detect + manual) ─────────────
    const GamePickerModal = ({ t, onSelect, onClose }) => {
      const [detected, setDetected] = useState(null);
      const [manual,   setManual]   = useState('');
      const [loading,  setLoading]  = useState(true);

      useEffect(() => {
        setLoading(true);
        if (_ow) {
          _ow.games.getRunningGameInfo(result => {
            setLoading(false);
            if (result && result.isRunning && result.gameInfo) {
              setDetected(result.gameInfo.displayName || result.gameInfo.title || 'Unknown Game');
            }
          });
        } else {
          setLoading(false);
        }
      }, []);

      const si = { background:t.bgInput, border:`1px solid ${t.border}`, borderRadius:8, padding:'9px 14px', fontSize:13, fontFamily:"'Barlow',sans-serif", color:t.textPrimary, outline:'none', width:'100%' };

      return (
        <div onClick={e => { if (e.target === e.currentTarget) onClose(); }}
          style={{ position:'fixed', inset:0, background:t.bgModal, zIndex:10000, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ background:t.bgPanel, border:`1px solid ${t.border}`, borderRadius:18, padding:24, width:460, maxHeight:'75vh', display:'flex', flexDirection:'column', gap:16, boxShadow:'0 24px 80px rgba(0,0,0,0.5)' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:18, color:t.textBright }}>🎮 Set Active Game</div>
              <button onClick={onClose} style={{ width:28, height:28, borderRadius:'50%', background:t.bgInput, border:`1px solid ${t.border}`, color:t.textMuted, cursor:'pointer', fontSize:13 }}>✕</button>
            </div>

            {loading && <div style={{ textAlign:'center', color:t.textMuted, fontSize:13, padding:16 }}>Scanning for running games…</div>}

            {!loading && detected && (
              <div>
                <div style={{ fontSize:11, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, letterSpacing:2, color:t.textMuted, marginBottom:8 }}>OVERWOLF DETECTED</div>
                <button onClick={() => onSelect(detected)}
                  style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 16px', background:t.bgCard, border:`2px solid ${t.orange}`, borderRadius:12, cursor:'pointer', width:'100%', textAlign:'left' }}
                  onMouseEnter={e => e.currentTarget.style.background=t.bgHover}
                  onMouseLeave={e => e.currentTarget.style.background=t.bgCard}>
                  <span style={{ fontSize:26 }}>🎮</span>
                  <div>
                    <div style={{ fontWeight:700, fontSize:14, color:t.textPrimary }}>{detected}</div>
                    <div style={{ fontSize:11, color:t.success, fontWeight:600 }}>● Currently Running</div>
                  </div>
                </button>
              </div>
            )}

            {!loading && !detected && (
              <div style={{ padding:'12px 14px', background:t.bgInput, border:`1px solid ${t.border}`, borderRadius:10, fontSize:12, color:t.textMuted }}>
                No game detected. Start a game and Overwolf will detect it automatically, or enter a game name below.
              </div>
            )}

            <div>
              <div style={{ fontSize:11, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, letterSpacing:2, color:t.textMuted, marginBottom:8 }}>ENTER GAME MANUALLY</div>
              <div style={{ display:'flex', gap:8 }}>
                <input style={si} value={manual} onChange={e => setManual(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && manual.trim() && onSelect(manual.trim())}
                  placeholder="e.g. Elden Ring, Minecraft…"
                  onFocus={e => e.target.style.borderColor='#FF6B1A'}
                  onBlur={e => e.target.style.borderColor=t.border} />
                <button onClick={() => manual.trim() && onSelect(manual.trim())} disabled={!manual.trim()}
                  style={{ padding:'9px 18px', background:'#FF6B1A', border:'none', borderRadius:8, color:'#fff', fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:13, cursor:!manual.trim() ? 'not-allowed' : 'pointer', opacity:!manual.trim() ? 0.5 : 1, whiteSpace:'nowrap' }}>
                  Set Game
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── Settings sub-components ───────────────────────────────────────
    const SCard = ({ title, icon, t, children }) => (
      <div style={{ background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:14, padding:20, display:'flex', flexDirection:'column', gap:14 }}>
        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:12, letterSpacing:2, color:t.textPrimary, display:'flex', alignItems:'center', gap:7, paddingBottom:12, borderBottom:`1px solid ${t.border}` }}>
          <span style={{ fontSize:16 }}>{icon}</span>{title}
        </div>
        {children}
      </div>
    );
    const SRow = ({ label, hint, t, children }) => (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:10 }}>
        <div>
          <div style={{ fontSize:13, fontWeight:600, color:t.textPrimary }}>{label}</div>
          {hint && <div style={{ fontSize:11, color:t.textMuted, marginTop:1 }}>{hint}</div>}
        </div>
        {children}
      </div>
    );
    const SToggle = ({ checked, onChange, t }) => (
      <label style={{ position:'relative', width:44, height:24, cursor:'pointer', display:'block', flexShrink:0 }}>
        <input type="checkbox" checked={checked} onChange={onChange} style={{ position:'absolute', opacity:0, width:'100%', height:'100%', margin:0, cursor:'pointer', zIndex:1 }} />
        <span style={{ position:'absolute', inset:0, background:checked ? '#FF6B1A' : t.border, borderRadius:12, transition:'background 0.2s' }} />
        <span style={{ position:'absolute', width:16, height:16, background:'#fff', borderRadius:'50%', top:4, left:checked ? 24 : 4, transition:'left 0.2s', boxShadow:'0 1px 4px rgba(0,0,0,0.2)', zIndex:2 }} />
      </label>
    );
    const SSlider = ({ value, min, max, step, onChange, display, t }) => (
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <input type="range" min={min} max={max} step={step} value={value} onChange={onChange} style={{ width:110, accentColor:'#FF6B1A', cursor:'pointer' }} />
        <span style={{ fontSize:12, color:t.textMuted, minWidth:38, fontFamily:"'DM Mono',monospace" }}>{display}</span>
      </div>
    );

    // ── Settings Panel ────────────────────────────────────────────────
    const SettingsPanel = ({ settings, setSettings, t, liveEvents }) => {
      const [rebinding,      setRebinding]      = useState(false);
      const [ttsVoices,      setTtsVoices]      = useState([]);
      const [inputDevices,   setInputDevices]   = useState([]);

      useEffect(() => {
        if (!navigator.mediaDevices) return;
        navigator.mediaDevices.enumerateDevices().then(devs => {
          setInputDevices(devs.filter(d => d.kind === 'audioinput'));
        }).catch(() => {});
      }, []);

      useEffect(() => {
        const load = () => {
          const vs = window.speechSynthesis?.getVoices() ?? [];
          if (vs.length) setTtsVoices([...vs]);
        };
        load();
        const t1 = setTimeout(load, 500);
        const t2 = setTimeout(load, 2000);
        window.speechSynthesis?.addEventListener('voiceschanged', load);
        return () => { clearTimeout(t1); clearTimeout(t2); window.speechSynthesis?.removeEventListener('voiceschanged', load); };
      }, []);

      // Hotkey rebinding
      useEffect(() => {
        if (!rebinding) return;
        const h = e => {
          e.preventDefault();
          const parts = [];
          if (e.ctrlKey)  parts.push('Ctrl');
          if (e.altKey)   parts.push('Alt');
          if (e.shiftKey) parts.push('Shift');
          if (!['Control','Alt','Shift'].includes(e.key))
            parts.push(e.key.length === 1 ? e.key.toUpperCase() : e.key);
          if (parts.length >= 2) {
            setSettings(s => ({ ...s, overlayHotkey: parts.join('+') }));
            setRebinding(false);
          }
        };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [rebinding, setSettings]);

      const si = { background:t.bgInput, border:`1px solid ${t.border}`, borderRadius:8, padding:'7px 12px', fontSize:13, fontFamily:"'Barlow',sans-serif", color:t.textPrimary, outline:'none', minWidth:150 };

      return (
        <div style={{ flex:1, overflowY:'auto', padding:'28px 32px', background:t.bgApp, display:'grid', gridTemplateColumns:'1fr 1fr', gap:18, alignContent:'start' }}>

          <SCard title="API KEY" icon="🔑" t={t}>
            <SRow label="Anthropic API Key" hint="From console.anthropic.com — required to chat" t={t}>
              <input style={{ ...si, minWidth:210 }} type="password" value={settings.apiKey} placeholder="sk-ant-…"
                onChange={e => setSettings(s => ({ ...s, apiKey:e.target.value }))} />
            </SRow>
            <div style={{ padding:'10px 14px', background:t.orangeSoft, border:`1px solid ${t.orangeBorder}`, borderRadius:10, fontSize:12, color:t.textMuted, lineHeight:1.6 }}>
              🔒 Stored in your browser's local storage — never transmitted anywhere except Anthropic's API.
            </div>
          </SCard>

          <SCard title="IDENTITY" icon="👤" t={t}>
            <SRow label="Your Username" hint="Casa uses your name to personalize" t={t}>
              <input style={si} value={settings.username} placeholder="Enter your name…"
                onChange={e => setSettings(s => ({ ...s, username:e.target.value }))} />
            </SRow>
            <SRow label="Assistant Voice" hint="Uses your system TTS voices" t={t}>
              <div style={{ display:'flex', gap:6, alignItems:'center', flex:1 }}>
                <select style={{ ...si, flex:1, cursor:'pointer' }} value={settings.voiceName}
                  onChange={e => setSettings(s => ({ ...s, voiceName:e.target.value }))}>
                  <option value="">— Auto (system default) —</option>
                  {ttsVoices.map(v => (
                    <option key={v.name} value={v.name}>{v.name}{v.lang ? ` (${v.lang})` : ''}</option>
                  ))}
                </select>
                <button onClick={() => {
                  const utt = new SpeechSynthesisUtterance("Hey, I'm Casa. Ready to help you game!");
                  if (settings.voiceName) { const v = window.speechSynthesis.getVoices().find(x => x.name === settings.voiceName); if (v) utt.voice = v; }
                  utt.rate = settings.speakRate ?? 1.0;
                  utt.volume = (settings.volume ?? 80) / 100;
                  window.speechSynthesis.cancel();
                  window.speechSynthesis.speak(utt);
                }} style={{ padding:'6px 12px', background:t.bgInput, border:`1px solid ${t.border}`, borderRadius:8, color:t.textSecond, fontFamily:"'Barlow',sans-serif", fontWeight:600, fontSize:11, cursor:'pointer', whiteSpace:'nowrap' }}>
                  ▶ Test
                </button>
              </div>
            </SRow>
          </SCard>

          <SCard title="AUDIO & SPEECH" icon="🔊" t={t}>
            <SRow label="Voice Responses" hint="Casa reads answers aloud" t={t}>
              <SToggle checked={settings.voiceEnabled} onChange={e => setSettings(s => ({ ...s, voiceEnabled:e.target.checked }))} t={t} />
            </SRow>
            <SRow label="Speak Speed" t={t}>
              <SSlider value={settings.speakRate} min={0.5} max={2} step={0.1}
                onChange={e => setSettings(s => ({ ...s, speakRate:parseFloat(e.target.value) }))}
                display={`${settings.speakRate}x`} t={t} />
            </SRow>
            <SRow label="Volume" t={t}>
              <SSlider value={settings.volume} min={0} max={100} step={5}
                onChange={e => setSettings(s => ({ ...s, volume:parseInt(e.target.value) }))}
                display={`${settings.volume}%`} t={t} />
            </SRow>
            {inputDevices.length > 0 && (
              <SRow label="Microphone" hint="Input device" t={t}>
                <select style={{ ...si, cursor:'pointer', maxWidth:200 }} value={settings.inputDeviceId || ''}
                  onChange={e => setSettings(s => ({ ...s, inputDeviceId:e.target.value }))}>
                  <option value="">System Default</option>
                  {inputDevices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || `Mic ${d.deviceId.slice(0,8)}`}</option>)}
                </select>
              </SRow>
            )}
          </SCard>

          <SCard title="WAKE WORD" icon="🎤" t={t}>
            <SRow label={`"Hey Casa" Activation`} hint="Hands-free trigger via Web Speech API" t={t}>
              <SToggle checked={settings.wakeWordEnabled} onChange={e => setSettings(s => ({ ...s, wakeWordEnabled:e.target.checked }))} t={t} />
            </SRow>
            <SRow label="Interrupt Speech" hint="Stop TTS when wake word heard" t={t}>
              <SToggle checked={settings.stopOnWake} onChange={e => setSettings(s => ({ ...s, stopOnWake:e.target.checked }))} t={t} />
            </SRow>
            <div style={{ padding:'10px 14px', background:t.orangeSoft, border:`1px solid ${t.orangeBorder}`, borderRadius:10, fontSize:12, color:t.textMuted, lineHeight:1.6 }}>
              💡 Requires microphone permission. Say <strong>"Hey Casa"</strong> to trigger voice input hands-free.
            </div>
          </SCard>

          <SCard title="OVERLAY / PiP" icon="🖥️" t={t}>
            <SRow label="Toggle Hotkey (UI rebind)" hint="Also configurable in Overwolf Settings" t={t}>
              <button onClick={() => setRebinding(true)}
                style={{ padding:'6px 14px', background:rebinding ? t.orangeSoft : t.bgInput, border:`1px solid ${rebinding ? '#FF6B1A' : t.border}`, borderRadius:8, fontFamily:"'DM Mono',monospace", fontSize:12, color:rebinding ? '#FF6B1A' : t.textPrimary, cursor:'pointer' }}>
                {rebinding ? 'Press keys…' : settings.overlayHotkey}
              </button>
            </SRow>
            <SRow label="Overlay Opacity" t={t}>
              <SSlider value={settings.overlayOpacity} min={30} max={100} step={5}
                onChange={e => setSettings(s => ({ ...s, overlayOpacity:parseInt(e.target.value) }))}
                display={`${settings.overlayOpacity}%`} t={t} />
            </SRow>
            <div style={{ padding:'10px 14px', background:t.orangeSoft, border:`1px solid ${t.orangeBorder}`, borderRadius:10, fontSize:12, color:t.textMuted, lineHeight:1.6 }}>
              💡 The in-game overlay appears above your game. Use the Overwolf hotkey (<strong>Ctrl+Shift+G</strong>) while in-game to toggle it.
            </div>
          </SCard>

          <SCard title="LIVE EVENTS" icon="⚡" t={t}>
            <SRow label="Web Search" hint="Searches web before answering" t={t}>
              <SToggle checked={settings.webSearch} onChange={e => setSettings(s => ({ ...s, webSearch:e.target.checked }))} t={t} />
            </SRow>
            <div style={{ padding:'10px 14px', background:t.bgInput, border:`1px solid ${t.border}`, borderRadius:10, fontSize:12, color:t.textMuted, lineHeight:1.7 }}>
              <strong style={{ color:t.textPrimary }}>Live Game Events Active</strong><br/>
              {liveEvents.length === 0
                ? 'No live events yet. Start a supported game to receive real-time data.'
                : `${liveEvents.length} event type(s) captured this session. Live data is automatically included in answers.`}
            </div>
          </SCard>

          <SCard title="APPEARANCE" icon="🎨" t={t}>
            <SRow label="Dark Mode" t={t}>
              <SToggle checked={settings.darkMode} onChange={e => setSettings(s => ({ ...s, darkMode:e.target.checked }))} t={t} />
            </SRow>
          </SCard>

          <SCard title="SYSTEM" icon="⚙️" t={t}>
            {[
              ['Timezone',   getTZ()],
              ['Local Time', getTime()],
              ['TTS Engine', window.speechSynthesis ? '✓ Available' : '✗ Unavailable'],
              ['Speech API', (window.SpeechRecognition||window.webkitSpeechRecognition) ? '✓ Available' : '✗ Unavailable'],
              ['Overwolf',   _ow ? '✓ Connected' : '✗ Not detected'],
              ['Version',    'CasaGG v3.1'],
              ['Platform',   'Overwolf'],
            ].map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:13 }}>
                <span style={{ color:t.textMuted }}>{k}</span>
                <span style={{ fontWeight:600, color:v.startsWith('✓') ? '#22C55E' : v.startsWith('✗') ? '#EF4444' : t.textPrimary, fontFamily:['Timezone','Local Time','Version'].includes(k) ? "'DM Mono',monospace" : 'inherit', fontSize:k === 'Local Time' ? 11 : 13 }}>{v}</span>
              </div>
            ))}
          </SCard>
        </div>
      );
    };

    // ════════════════════════════════════════════════════════════════
    //  MAIN APP
    // ════════════════════════════════════════════════════════════════
    function CasaGG() {
      const DEFAULT = {
        apiKey:'', username:'', voiceGender:'female', voiceName:'', speakRate:1.0, volume:80,
        voiceEnabled:true, wakeWordEnabled:true, stopOnWake:true,
        overlayHotkey:'Ctrl+Shift+G', overlayOpacity:90,
        darkMode:true, webSearch:true, inputDeviceId:''
      };

      const [showIntro,    setShowIntro]    = useState(true);
      const [settings,     setSettings]     = useState(() => loadSettings(DEFAULT));
      const [tab,          setTab]          = useState('chat');
      const [messages,     setMessages]     = useState([]);
      const [input,        setInput]        = useState('');
      const [loading,      setLoading]      = useState(false);
      const [speaking,     setSpeaking]     = useState(false);
      const [listening,    setListening]    = useState(false);
      const [overlayOpen,  setOverlayOpen]  = useState(false);
      const [showGamePicker, setShowGamePicker] = useState(false);
      const [detectedGame, setDetectedGame] = useState(null);
      const [localTime,    setLocalTime]    = useState(getTime());
      const [lastAnswer,   setLastAnswer]   = useState('');
      const [history,      setHistory]      = useState([]);
      const [wakeActive,   setWakeActive]   = useState(false);
      const [wakeError,    setWakeError]    = useState('');
      const [speechReady,  setSpeechReady]  = useState(false);
      const [interimText,  setInterimText]  = useState('');
      const [searchStatus, setSearchStatus] = useState('');
      const [liveEvents,   setLiveEvents]   = useState([]); // game events buffer

      const logoClicks = useRef(0);
      const logoTimer  = useRef(null);
      const t          = THEMES[settings.darkMode ? 'dark' : 'light'];
      const messagesEnd = useRef(null);
      const convRef    = useRef([]);
      const handleSendRef = useRef(null);
      const settingsRef   = useRef(settings);
      const wakeRecRef    = useRef(null);
      const dictRecRef    = useRef(null);
      const vizCanvasRef  = useRef(null);
      const vizFrameRef   = useRef(null);
      const vizStreamRef  = useRef(null);

      useEffect(() => { settingsRef.current = settings; }, [settings]);

      // ── Persist settings ─────────────────────────────────────────
      useEffect(() => {
        saveSettings(settings);
      }, [settings]);

      // ── Clock ────────────────────────────────────────────────────
      useEffect(() => {
        const i = setInterval(() => setLocalTime(getTime()), 30000);
        return () => clearInterval(i);
      }, []);

      // ── Auto-scroll ──────────────────────────────────────────────
      useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);

      // ── Listen for Overwolf messages from background ──────────────
      useEffect(() => {
        if (!_ow) return;
        const handler = msg => {
          const type    = msg.id;
          const content = msg.content || {};
          switch (type) {
            case 'game-launched':
              setDetectedGame(content.gameName);
              break;
            case 'game-closed':
              setDetectedGame(null);
              setLiveEvents([]);
              break;
            case 'overlay-state':
              setOverlayOpen(!!content.open);
              break;
            case 'ask-from-overlay':
              handleSendRef.current?.(content.question);
              break;
            case 'voice-ask-trigger':
              startDictation();
              break;
            case 'game-event':
              setLiveEvents(prev => {
                const updated = [...prev];
                (content.events || []).forEach(ev => {
                  const idx = updated.findIndex(e => e.name === ev.name);
                  const entry = { name: ev.name, data: ev.data, ts: Date.now() };
                  if (idx >= 0) updated[idx] = entry;
                  else updated.push(entry);
                });
                return updated.slice(-20); // keep last 20 event types
              });
              break;
            case 'game-info-update':
              setLiveEvents(prev => {
                const updated = [...prev];
                const info = content.info || {};
                Object.entries(info).forEach(([category, values]) => {
                  if (typeof values === 'object') {
                    Object.entries(values).forEach(([key, val]) => {
                      const name = `${category}.${key}`;
                      const idx = updated.findIndex(e => e.name === name);
                      const entry = { name, data: val, ts: Date.now() };
                      if (idx >= 0) updated[idx] = entry;
                      else updated.push(entry);
                    });
                  }
                });
                return updated.slice(-20);
              });
              break;
          }
        };
        _ow.windows.onMessageReceived.addListener(handler);
        return () => {
          try { _ow.windows.onMessageReceived.removeListener(handler); } catch {}
        };
      }, []);

      // ── In-window hotkey fallback ─────────────────────────────────
      useEffect(() => {
        const h = e => {
          const combo = [e.ctrlKey && 'Ctrl', e.altKey && 'Alt', e.shiftKey && 'Shift',
            !['Control','Alt','Shift'].includes(e.key) && (e.key.length === 1 ? e.key.toUpperCase() : e.key)
          ].filter(Boolean).join('+');
          if (combo === settings.overlayHotkey) {
            e.preventDefault();
            toggleOverlay();
          }
        };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [settings.overlayHotkey]);

      // ── Check for game on load ────────────────────────────────────
      useEffect(() => {
        if (!_ow) return;
        _ow.games.getRunningGameInfo(result => {
          if (result && result.isRunning && result.gameInfo) {
            setDetectedGame(result.gameInfo.displayName || result.gameInfo.title || 'Unknown Game');
          }
        });
      }, []);

      // ── Mic visualizer ────────────────────────────────────────────
      useEffect(() => {
        const on = listening || wakeActive;
        if (!on) {
          if (vizFrameRef.current) { cancelAnimationFrame(vizFrameRef.current); vizFrameRef.current = null; }
          vizStreamRef.current?.getTracks().forEach(t => t.stop()); vizStreamRef.current = null;
          const cv = vizCanvasRef.current;
          if (cv) { const c = cv.getContext('2d'); c.clearRect(0,0,cv.width,cv.height); }
          return;
        }
        navigator.mediaDevices?.getUserMedia({ audio: true, video: false }).then(stream => {
          vizStreamRef.current = stream;
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          const analyser = actx.createAnalyser(); analyser.fftSize = 64;
          actx.createMediaStreamSource(stream).connect(analyser);
          const data = new Uint8Array(analyser.frequencyBinCount);
          const draw = () => {
            vizFrameRef.current = requestAnimationFrame(draw);
            const cv = vizCanvasRef.current; if (!cv) return;
            analyser.getByteFrequencyData(data);
            const ctx = cv.getContext('2d'); ctx.clearRect(0,0,cv.width,cv.height);
            const bars = 18; const bw = (cv.width - bars + 1) / bars;
            for (let i = 0; i < bars; i++) {
              const v = data[Math.floor(i * data.length / bars)] / 255;
              const h = Math.max(3, v * cv.height);
              ctx.fillStyle = `rgba(255,107,26,${0.35 + v * 0.65})`;
              ctx.beginPath();
              ctx.roundRect(i*(bw+1), cv.height - h, bw, h, 2);
              ctx.fill();
            }
          };
          draw();
        }).catch(() => {});
        return () => {
          if (vizFrameRef.current) { cancelAnimationFrame(vizFrameRef.current); vizFrameRef.current = null; }
          vizStreamRef.current?.getTracks().forEach(t => t.stop()); vizStreamRef.current = null;
        };
      }, [listening, wakeActive]);

      // ── Web Speech API — Wake word ─────────────────────────────────
      useEffect(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setSpeechReady(false); setWakeError('Speech recognition unavailable in this browser.'); return; }

        if (!settings.wakeWordEnabled) {
          setWakeActive(false);
          try { wakeRecRef.current?.stop(); } catch {}
          return;
        }

        let wakeRec;
        const startWake = () => {
          try {
            wakeRec = new SR();
            wakeRec.continuous = true;
            wakeRec.interimResults = true;
            wakeRec.lang = 'en-US';

            wakeRec.onstart = () => {
              setSpeechReady(true);
              setWakeActive(true);
              setWakeError('');
            };

            wakeRec.onresult = e => {
              const txt = Array.from(e.results).map(r => r[0].transcript).join(' ').toLowerCase();
              if (txt.includes('hey casa') || txt.includes('hey kasa') || txt.includes('a casa')) {
                wakeRec.stop();
                if (settingsRef.current.stopOnWake) { stopSpeak(); setSpeaking(false); }
                try { const sfx = new Audio(assetPath('casaplop.mp3')); sfx.volume = 0.25; sfx.play().catch(()=>{}); } catch {}
                setTimeout(() => startDictation(), 400);
              }
            };

            wakeRec.onerror = e => {
              setWakeActive(false);
              if (e.error !== 'no-speech' && e.error !== 'aborted') setWakeError(e.error);
              setTimeout(startWake, 2000);
            };

            wakeRec.onend = () => {
              setWakeActive(false);
              if (settingsRef.current.wakeWordEnabled && !settingsRef.current._dictating) {
                setTimeout(startWake, 500);
              }
            };

            wakeRec.start();
            wakeRecRef.current = wakeRec;
          } catch (err) {
            setWakeError(err.message);
            setTimeout(startWake, 3000);
          }
        };

        startWake();
        return () => {
          try { wakeRec?.stop(); } catch {}
          try { wakeRecRef.current?.stop(); } catch {}
        };
      }, [settings.wakeWordEnabled]);

      // ── Dictation ─────────────────────────────────────────────────
      const startDictation = useCallback(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { alert('Speech recognition is unavailable.'); return; }
        try { dictRecRef.current?.stop(); } catch {}

        const dictRec = new SR();
        dictRec.continuous = false;
        dictRec.interimResults = true;
        dictRec.lang = 'en-US';

        dictRec.onstart = () => { setListening(true); setInterimText(''); };

        dictRec.onresult = e => {
          const transcript = Array.from(e.results).map(r => r[0].transcript).join(' ');
          if (e.results[e.results.length - 1].isFinal) {
            setListening(false);
            setInterimText('');
            if (transcript.trim()) handleSendRef.current?.(transcript.trim());
          } else {
            setInterimText(transcript);
          }
        };

        dictRec.onerror = () => { setListening(false); setInterimText(''); };
        dictRec.onend = () => {
          setListening(false);
          setInterimText('');
          settingsRef.current._dictating = false;
        };

        settingsRef.current._dictating = true;
        try { dictRec.start(); dictRecRef.current = dictRec; } catch (err) { setListening(false); }
      }, []);

      const stopListening = useCallback(() => {
        try { dictRecRef.current?.stop(); } catch {}
        setListening(false);
        setInterimText('');
        settingsRef.current._dictating = false;
      }, []);

      const stopAll = useCallback(() => { stopSpeak(); setSpeaking(false); stopListening(); }, [stopListening]);

      // ── Logo easter egg ───────────────────────────────────────────
      const handleLogoClick = useCallback(() => {
        logoClicks.current += 1;
        if (logoTimer.current) clearTimeout(logoTimer.current);
        if (logoClicks.current >= 3) {
          logoClicks.current = 0;
          try { const sfx = new Audio(assetPath('sheknowseasteregg.mp3')); sfx.volume = 1.0; sfx.play().catch(()=>{}); } catch {}
        } else {
          logoTimer.current = setTimeout(() => { logoClicks.current = 0; }, 700);
        }
      }, []);

      // ── Overlay toggle ─────────────────────────────────────────────
      const toggleOverlay = useCallback(() => {
        if (_ow) {
          try { getBg()?.CasaBackground?.toggleOverlay(); }
          catch {
            _ow.windows.sendMessage && _ow.windows.obtainDeclaredWindow('background', r => {
              if (r.success) _ow.windows.sendMessage(r.window.id, 'toggle-overlay', {}, () => {});
            });
          }
        } else {
          setOverlayOpen(o => !o);
        }
      }, []);

      // ── Show map ───────────────────────────────────────────────────
      const showMap = useCallback(() => {
        if (_ow) {
          try { getBg()?.CasaBackground?.showMap(); }
          catch { _ow.windows.obtainDeclaredWindow('map', r => { if (r.success) _ow.windows.restore(r.window.id, ()=>{}); }); }
        }
      }, []);

      // ── AI call ────────────────────────────────────────────────────
      const callCasa = async msg => {
        if (!settings.apiKey) throw new Error('No API key set — add yours in ⚙️ Settings.');

        let searchResults = [];
        if (settings.webSearch) {
          setSearchStatus('Searching the web…');
          try { searchResults = await webSearch(detectedGame ? `${detectedGame} ${msg}` : msg); }
          catch {}
          setSearchStatus('');
        }

        const sys = buildSystemPrompt(settings.username, getTZ(), detectedGame, searchResults, liveEvents);
        convRef.current = [...convRef.current, { role:'user', content:msg }].slice(-14);

        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type':      'application/json',
            'x-api-key':         settings.apiKey,
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1200, system:sys, messages:convRef.current })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error?.message || `API error ${res.status}`);
        }

        const data  = await res.json();
        const reply = data.content?.[0]?.text ?? "Couldn't get an answer — try again!";
        convRef.current = [...convRef.current, { role:'assistant', content:reply }];
        return reply;
      };

      // ── Send message ───────────────────────────────────────────────
      const handleSend = async text => {
        const q = (text ?? input).trim();
        if (!q || loading) return;
        setInput('');
        stopSpeak(); setSpeaking(false);
        const ts = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        setMessages(m => [...m, { role:'user', content:q, ts }]);
        setLoading(true);

        // Notify overlay of thinking state
        if (_ow) {
          try { getBg()?.CasaBackground?.relayThinkingToOverlay('Thinking…'); } catch {}
        }

        try {
          const reply = await callCasa(q);
          const rts = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
          setMessages(m => [...m, { role:'assistant', content:reply, ts:rts }]);
          setLastAnswer(reply);
          setHistory(h => [{ q, ts:rts }, ...h].slice(0, 40));

          // Push answer to overlay
          if (_ow) {
            try { getBg()?.CasaBackground?.relayAnswerToOverlay(reply); } catch {}
          }

          if (settings.voiceEnabled) { setSpeaking(true); doSpeak(reply, settings, () => setSpeaking(false)); }
        } catch (err) {
          setMessages(m => [...m, { role:'assistant', content:`⚠️ ${err.message}`, ts:'' }]);
        }
        setLoading(false);
        setSearchStatus('');
      };

      handleSendRef.current = handleSend;

      // ── CSS ────────────────────────────────────────────────────────
      const css = `
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        body,#root { height:100vh; overflow:hidden; font-family:'Barlow',sans-serif; background:${t.bgApp}; color:${t.textPrimary}; }
        ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-thumb { background:${t.border}; border-radius:3px; }
        @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.35} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
        @keyframes glow   { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,26,0.5)} 70%{box-shadow:0 0 0 12px rgba(255,107,26,0)} }
        @keyframes wave   { 0%,100%{height:3px} 50%{height:15px} }
        @keyframes listenRing { 0%{transform:scale(1);opacity:0.7} 100%{transform:scale(2.2);opacity:0} }
        @keyframes spin   { to{transform:rotate(360deg)} }
        .msg-in { animation:fadeUp 0.22s ease; }
        .sb-qbtn:hover { background:${t.orangeSoft}!important; border-color:${t.orangeBorder}!important; color:#FF6B1A!important; }
        select,input,textarea { color-scheme:${settings.darkMode ? 'dark' : 'light'}; }
        input:focus,select:focus,textarea:focus { outline:none; border-color:#FF6B1A!important; }
      `;

      const greeting = settings.username ? `Hey ${settings.username}, I'm CasaGG` : "Hey! I'm CasaGG";
      const handleIntroDone = useCallback(() => setShowIntro(false), []);

      return (
        <>
          <style>{css}</style>
          <div style={{ display:'flex', flexDirection:'column', height:'100vh', background:t.bgApp, color:t.textPrimary }}>

            {/* ── TITLE BAR ─────────────────────────────────────────────── */}
            <div style={{ height:58, background:t.bgPanel, borderBottom:`1px solid ${t.border}`, display:'flex', alignItems:'center', padding:'0 20px', gap:14, flexShrink:0, boxShadow:t.shadow }}>
              <img src={assetPath('casaorangegg.png')} alt="Casa.GG" onClick={handleLogoClick} title="Casa.GG (triple-click for surprise)"
                style={{ width:38, height:38, objectFit:'contain', cursor:'pointer', userSelect:'none', filter:'drop-shadow(0 2px 6px rgba(255,107,26,0.35))' }} />
              <div style={{ width:1, height:28, background:t.border }} />
              <div style={{ display:'flex', gap:3, background:t.bgApp, border:`1px solid ${t.border}`, borderRadius:10, padding:3 }}>
                {[['chat','🎮','Assistant'],['settings','⚙️','Settings']].map(([id,ic,lbl]) => (
                  <button key={id} onClick={() => setTab(id)}
                    style={{ padding:'5px 18px', border:'none', borderRadius:7, cursor:'pointer', fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:13, letterSpacing:0.8, transition:'all 0.18s', background:tab===id ? '#FF6B1A' : 'transparent', color:tab===id ? '#fff' : t.textMuted, boxShadow:tab===id ? '0 2px 10px rgba(255,107,26,0.3)' : 'none' }}>
                    {ic} {lbl}
                  </button>
                ))}
              </div>
              <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:10 }}>
                {detectedGame && (
                  <div style={{ display:'flex', alignItems:'center', gap:6, padding:'4px 12px', background:t.orangeSoft, border:`1px solid ${t.orangeBorder}`, borderRadius:20 }}>
                    <span style={{ width:6, height:6, borderRadius:'50%', background:t.success, boxShadow:`0 0 5px ${t.success}`, animation:'blink 2s infinite' }} />
                    <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:12, color:t.orange, letterSpacing:0.5 }}>{detectedGame}</span>
                  </div>
                )}
                {liveEvents.length > 0 && (
                  <div style={{ display:'flex', alignItems:'center', gap:5, padding:'3px 10px', background:'rgba(34,197,94,0.1)', border:'1px solid rgba(34,197,94,0.3)', borderRadius:20 }}
                    title={`${liveEvents.length} live event types captured`}>
                    <span style={{ width:6, height:6, borderRadius:'50%', background:'#22C55E', animation:'blink 1.5s infinite' }} />
                    <span style={{ fontSize:10, fontWeight:700, color:'#22C55E', fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:1 }}>LIVE DATA</span>
                  </div>
                )}
                <button onClick={() => setSettings(s => ({ ...s, darkMode:!s.darkMode }))}
                  style={{ width:34, height:34, borderRadius:8, background:t.bgInput, border:`1px solid ${t.border}`, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>
                  {settings.darkMode ? '☀️' : '🌙'}
                </button>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:t.textMuted, background:t.bgInput, border:`1px solid ${t.border}`, padding:'4px 10px', borderRadius:20 }}>🕐 {localTime}</div>
              </div>
            </div>

            {/* Speaking banner */}
            {speaking && (
              <div style={{ height:36, background:t.orangeSoft, borderBottom:`1px solid ${t.orangeBorder}`, display:'flex', alignItems:'center', padding:'0 20px', gap:12, flexShrink:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:3 }}>
                  {[...Array(5)].map((_,i) => <div key={i} style={{ width:3, background:'#FF6B1A', borderRadius:2, animation:`wave 0.7s ${i*0.12}s ease-in-out infinite`, height:3 }} />)}
                </div>
                <span style={{ fontSize:12, fontWeight:600, color:'#FF6B1A' }}>Casa is speaking…</span>
                <button onClick={stopAll} style={{ marginLeft:'auto', padding:'3px 14px', background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:20, fontSize:11, color:t.textSecond, cursor:'pointer', fontWeight:600 }}>■ Stop</button>
              </div>
            )}

            {/* Search status */}
            {searchStatus && (
              <div style={{ height:28, background:'rgba(6,182,212,0.08)', borderBottom:'1px solid rgba(6,182,212,0.2)', display:'flex', alignItems:'center', padding:'0 20px', gap:8, flexShrink:0 }}>
                <div style={{ width:10, height:10, border:'2px solid #06b6d4', borderTopColor:'transparent', borderRadius:'50%', animation:'spin 0.7s linear infinite' }} />
                <span style={{ fontSize:11, color:'#06b6d4', fontWeight:600 }}>{searchStatus}</span>
              </div>
            )}

            <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
              {/* ── SIDEBAR ─────────────────────────────────────────────── */}
              {tab === 'chat' && (
                <div style={{ width:252, background:t.bgSidebar, borderRight:`1px solid ${t.border}`, display:'flex', flexDirection:'column', flexShrink:0 }}>

                  {/* Game Detection */}
                  <div style={{ padding:'16px 14px 12px' }}>
                    <div style={{ fontSize:9, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, letterSpacing:2.5, color:t.textMuted, marginBottom:8 }}>OVERWOLF GAME DETECTION</div>
                    <div style={{ border:`1px solid ${t.border}`, borderRadius:10, overflow:'hidden', background:t.bgCard }}>
                      <div style={{ aspectRatio:'16/9', background:detectedGame ? t.orangeSoft : t.bgInput, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:5, borderBottom:`1px solid ${t.border}` }}>
                        {detectedGame
                          ? <><span style={{ fontSize:26 }}>🎮</span><span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:12, color:t.orange }}>{detectedGame}</span><span style={{ fontSize:10, color:t.success, fontWeight:600 }}>● LIVE CONTEXT</span></>
                          : <><span style={{ fontSize:24, opacity:0.25 }}>🖥️</span><span style={{ fontSize:11, color:t.textMuted }}>Waiting for game…</span></>
                        }
                      </div>
                      <button onClick={() => setShowGamePicker(true)}
                        style={{ width:'100%', padding:'9px 0', background:'transparent', border:'none', fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:11, letterSpacing:1.2, color:t.orange, cursor:'pointer', transition:'background 0.15s' }}
                        onMouseEnter={e => e.currentTarget.style.background=t.orangeSoft}
                        onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                        {detectedGame ? '⟳ CHANGE GAME' : '🔍 SET GAME'}
                      </button>
                    </div>
                  </div>

                  {/* Live Events Feed */}
                  {liveEvents.length > 0 && (
                    <div style={{ padding:'0 14px 12px' }}>
                      <div style={{ fontSize:9, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, letterSpacing:2.5, color:t.textMuted, marginBottom:6 }}>LIVE EVENTS</div>
                      <div style={{ border:`1px solid ${t.border}`, borderRadius:8, background:t.bgCard, padding:'8px', maxHeight:80, overflowY:'auto' }}>
                        {liveEvents.slice(0, 5).map((ev, i) => (
                          <div key={i} style={{ fontSize:10, color:t.textSecond, display:'flex', justifyContent:'space-between', gap:4, marginBottom:2 }}>
                            <span style={{ color:t.orange, fontFamily:"'DM Mono',monospace", flexShrink:0, overflow:'hidden', textOverflow:'ellipsis', maxWidth:'60%' }}>{ev.name}</span>
                            <span style={{ color:t.textMuted, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{typeof ev.data === 'object' ? JSON.stringify(ev.data).slice(0,20) : String(ev.data).slice(0,20)}</span>
                          </div>
                        ))}
                      </div>
                      <button onClick={showMap}
                        style={{ marginTop:6, width:'100%', padding:'7px 0', background:t.orangeSoft, border:`1px solid ${t.orangeBorder}`, borderRadius:8, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:11, letterSpacing:1.2, color:t.orange, cursor:'pointer' }}>
                        🗺️ OPEN LIVE MAP
                      </button>
                    </div>
                  )}

                  {/* Wake word status */}
                  <div style={{ padding:'0 14px 12px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', background: listening ? 'rgba(255,107,26,0.12)' : settings.wakeWordEnabled ? t.orangeSoft : t.bgInput, border:`1px solid ${listening ? '#FF6B1A' : settings.wakeWordEnabled ? t.orangeBorder : t.border}`, borderRadius:10 }}>
                      <div style={{ width:10, height:10, borderRadius:'50%', flexShrink:0,
                        background: listening ? '#FF6B1A' : wakeActive ? '#FF9A56' : !settings.wakeWordEnabled ? t.textMuted : '#888',
                        animation: listening || wakeActive ? 'glow 1s infinite' : 'none',
                        boxShadow: listening ? '0 0 8px #FF6B1A' : 'none' }} />
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:12, fontWeight:600, color:t.textPrimary }}>
                          {listening ? '🎙 Listening — speak now…' : <>Say <span style={{ color:t.orange, fontFamily:"'DM Mono',monospace", fontSize:11 }}>"Hey Casa"</span></>}
                        </div>
                        <div style={{ fontSize:10, color: wakeError ? '#FF4444' : interimText ? t.orange : t.textMuted, fontStyle: interimText ? 'italic' : 'normal', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                          {wakeError || interimText || (
                            !settings.wakeWordEnabled ? 'Off — enable in Settings' :
                            !speechReady ? 'Starting mic…' :
                            listening ? 'Ask your question…' :
                            wakeActive ? 'Listening for wake word…' : 'Standby'
                          )}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Quick actions */}
                  <div style={{ padding:'0 14px 12px' }}>
                    <div style={{ fontSize:9, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, letterSpacing:2.5, color:t.textMuted, marginBottom:8 }}>QUICK ACTIONS</div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:5 }}>
                      {QUICK.map(({ icon, label }) => (
                        <button key={label} className="sb-qbtn"
                          onClick={() => handleSend(`${label}${detectedGame ? ` in ${detectedGame}` : ''}`)}
                          style={{ padding:'7px 5px', background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:8, fontFamily:"'Barlow',sans-serif", fontSize:11, fontWeight:600, color:t.textSecond, cursor:'pointer', transition:'all 0.15s', textAlign:'center' }}>
                          {icon} {label}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* History */}
                  <div style={{ padding:'0 14px 6px' }}>
                    <div style={{ fontSize:9, fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, letterSpacing:2.5, color:t.textMuted }}>RECENT</div>
                  </div>
                  <div style={{ flex:1, overflowY:'auto', padding:'0 6px' }}>
                    {history.length === 0
                      ? <div style={{ fontSize:12, color:t.textMuted, padding:'6px 10px' }}>No history yet</div>
                      : history.map((h, i) => (
                        <div key={i} onClick={() => handleSend(h.q)}
                          style={{ padding:'7px 10px', borderRadius:8, cursor:'pointer', marginBottom:1, transition:'background 0.12s' }}
                          onMouseEnter={e => e.currentTarget.style.background=t.bgHover}
                          onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                          <div style={{ fontSize:12, color:t.textPrimary, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{h.q}</div>
                          <div style={{ fontSize:10, color:t.textMuted, fontFamily:"'DM Mono',monospace" }}>{h.ts}</div>
                        </div>
                      ))
                    }
                  </div>

                  <div style={{ padding:'9px 14px', borderTop:`1px solid ${t.border}`, display:'flex', alignItems:'center', gap:6, fontSize:10, color:t.textMuted, fontFamily:"'DM Mono',monospace" }}>
                    <span style={{ background:t.bgInput, border:`1px solid ${t.border}`, borderRadius:3, padding:'1px 5px', color:t.textSecond, fontSize:10 }}>{settings.overlayHotkey}</span>
                    <span>Toggle Game Overlay</span>
                  </div>
                </div>
              )}

              {/* ── CHAT PANEL ─────────────────────────────────────────── */}
              {tab === 'chat' ? (
                <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
                  <div style={{ flex:1, overflowY:'auto', padding:'28px 32px', display:'flex', flexDirection:'column', gap:20 }}>
                    {messages.length === 0 ? (
                      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center', gap:24, padding:48 }}>
                        <img src={assetPath('casaorangegg.png')} alt="CasaGG"
                          style={{ width:88, height:88, objectFit:'contain', filter:'drop-shadow(0 8px 32px rgba(255,107,26,0.45))', animation:'glow 3s infinite' }} />
                        <div>
                          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:800, fontSize:28, color:t.textBright, marginBottom:10, letterSpacing:0.5 }}>{greeting}.</div>
                          <div style={{ fontSize:15, color:t.textMuted, maxWidth:440, lineHeight:1.75 }}>
                            Your real-time gaming buddy, now powered by Overwolf.<br/>
                            Bosses, builds, lore, live events, map positions — I've got you.<br/>
                            Say <strong style={{ color:t.orange }}>"Hey Casa"</strong> to go completely hands-free.
                          </div>
                        </div>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:8, justifyContent:'center', maxWidth:500 }}>
                          {QUICK.map(({ icon, label }) => (
                            <span key={label} className="sb-qbtn" onClick={() => handleSend(label)}
                              style={{ padding:'7px 16px', background:t.bgCard, border:`1px solid ${t.border}`, borderRadius:20, fontSize:13, color:t.textSecond, cursor:'pointer', transition:'all 0.15s', fontWeight:500 }}>
                              {icon} {label}
                            </span>
                          ))}
                        </div>
                      </div>
                    ) : (
                      messages.map((m, i) => (
                        <div key={i} className="msg-in" style={{ display:'flex', gap:12, flexDirection:m.role === 'user' ? 'row-reverse' : 'row' }}>
                          <div style={{ width:36, height:36, borderRadius:10, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden', marginTop:2, border:m.role === 'assistant' ? `1px solid ${t.border}` : 'none', boxShadow:m.role === 'user' ? t.shadowOrange : t.shadowCard, background:m.role === 'user' ? '#FF6B1A' : t.bgCard }}>
                            {m.role === 'user'
                              ? <span style={{ fontSize:18 }}>👤</span>
                              : <img src={assetPath('casaorangegg.png')} alt="" style={{ width:36, height:36, objectFit:'contain' }} />
                            }
                          </div>
                          <div style={{ maxWidth:'70%', display:'flex', flexDirection:'column', gap:4, alignItems:m.role === 'user' ? 'flex-end' : 'flex-start' }}>
                            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                              <span style={{ fontSize:11, fontWeight:700, fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:0.5, color:m.role === 'user' ? t.orange : t.textBright }}>
                                {m.role === 'user' ? (settings.username || 'You') : 'Casa.GG'}
                              </span>
                              {m.ts && <span style={{ fontSize:10, color:t.textMuted, fontFamily:"'DM Mono',monospace" }}>{m.ts}</span>}
                            </div>
                            <div style={{ padding:'12px 16px', borderRadius:m.role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px', background:m.role === 'user' ? 'linear-gradient(135deg,#FF6B1A,#FF8A42)' : t.bgCard, color:m.role === 'user' ? '#fff' : t.textPrimary, fontSize:14, lineHeight:1.7, border:m.role === 'assistant' ? `1px solid ${t.border}` : 'none', boxShadow:m.role === 'user' ? t.shadowOrange : t.shadowCard }}>
                              {m.role === 'assistant' ? <Formatted text={m.content} t={t} /> : m.content}
                            </div>
                          </div>
                        </div>
                      ))
                    )}
                    {loading && (
                      <div className="msg-in" style={{ display:'flex', gap:12 }}>
                        <div style={{ width:36, height:36, borderRadius:10, background:t.bgCard, border:`1px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, overflow:'hidden', boxShadow:t.shadowCard }}>
                          <img src={assetPath('casaorangegg.png')} alt="" style={{ width:36, height:36, objectFit:'contain' }} />
                        </div>
                        <div style={{ padding:'13px 18px', background:t.bgCard, borderRadius:'14px 14px 14px 4px', border:`1px solid ${t.border}`, boxShadow:t.shadowCard, display:'flex', alignItems:'center', gap:12 }}>
                          <div style={{ display:'flex', gap:5 }}>
                            {[...Array(3)].map((_,i) => <div key={i} style={{ width:7, height:7, borderRadius:'50%', background:'#FF6B1A', animation:`blink 1.1s ${i*0.22}s infinite` }} />)}
                          </div>
                          <span style={{ fontSize:12, color:t.textMuted }}>{searchStatus || 'Thinking…'}</span>
                        </div>
                      </div>
                    )}
                    <div ref={messagesEnd} />
                  </div>

                  {/* ── INPUT AREA ─────────────────────────────────────── */}
                  <div style={{ padding:'14px 24px 18px', background:t.bgPanel, borderTop:`1px solid ${t.border}`, display:'flex', flexDirection:'column', gap:10, flexShrink:0 }}>
                    <div style={{ position:'relative' }}>
                      <textarea value={input} onChange={e => setInput(e.target.value)}
                        onKeyDown={e => {
                          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
                          if ((speaking || listening) && e.key !== 'Enter') stopAll();
                        }}
                        placeholder={listening && interimText ? interimText : `Ask Casa.GG anything${detectedGame ? ` about ${detectedGame}` : ''}… or say "Hey Casa"`}
                        rows={1}
                        style={{ width:'100%', background: listening ? 'rgba(255,107,26,0.04)' : t.bgInput, border:`1px solid ${listening ? '#FF6B1A' : t.border}`, borderRadius:12, padding:'12px 52px 12px 16px', fontFamily:"'Barlow',sans-serif", fontSize:14, color:t.textPrimary, resize:'none', outline:'none', minHeight:48, maxHeight:120, lineHeight:1.5, transition:'border-color 0.2s' }}
                        onFocus={e => e.target.style.borderColor='#FF6B1A'}
                        onBlur={e => e.target.style.borderColor=t.border} />
                      <button onClick={() => handleSend()} disabled={!input.trim() || loading}
                        style={{ position:'absolute', right:10, bottom:10, width:32, height:32, background:!input.trim()||loading ? t.border : 'linear-gradient(135deg,#FF6B1A,#FF8A42)', border:'none', borderRadius:9, cursor:!input.trim()||loading ? 'not-allowed' : 'pointer', display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.2s', boxShadow:!input.trim()||loading ? 'none' : t.shadowOrange }}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={!input.trim()||loading ? t.textMuted : '#fff'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                      </button>
                    </div>

                    <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                      <canvas ref={vizCanvasRef} width={80} height={28}
                        style={{ display: listening || wakeActive ? 'block' : 'none', borderRadius:6, background: t.bgInput, border:`1px solid ${listening ? '#FF6B1A' : t.border}`, alignSelf:'center' }} />

                      <button onClick={listening ? stopListening : startDictation}
                        style={{ position:'relative', display:'flex', alignItems:'center', gap:7, padding:'7px 16px', background:listening ? t.orangeSoft : t.bgInput, border:`1px solid ${listening ? '#FF6B1A' : t.border}`, borderRadius:20, color:listening ? '#FF6B1A' : t.textSecond, fontFamily:"'Barlow',sans-serif", fontWeight:600, fontSize:12, cursor:'pointer', transition:'all 0.15s' }}>
                        {listening && <span style={{ position:'absolute', inset:-4, border:'1.5px solid rgba(255,107,26,0.4)', borderRadius:24, animation:'listenRing 1.2s infinite' }}/>}
                        🎙️ {listening ? 'Listening…' : 'Voice Ask'}
                      </button>

                      <button onClick={toggleOverlay}
                        style={{ display:'flex', alignItems:'center', gap:7, padding:'7px 16px', background:overlayOpen ? t.orangeSoft : t.bgInput, border:`1px solid ${overlayOpen ? '#FF6B1A' : t.border}`, borderRadius:20, color:overlayOpen ? '#FF6B1A' : t.textSecond, fontFamily:"'Barlow',sans-serif", fontWeight:600, fontSize:12, cursor:'pointer', transition:'all 0.15s' }}>
                        🖥️ {overlayOpen ? 'Hide Overlay' : 'Game Overlay'}
                      </button>

                      <button onClick={showMap}
                        style={{ display:'flex', alignItems:'center', gap:7, padding:'7px 16px', background:t.bgInput, border:`1px solid ${t.border}`, borderRadius:20, color:t.textSecond, fontFamily:"'Barlow',sans-serif", fontWeight:600, fontSize:12, cursor:'pointer' }}>
                        🗺️ Map
                      </button>

                      {speaking && (
                        <button onClick={stopAll}
                          style={{ display:'flex', alignItems:'center', gap:6, padding:'7px 16px', background:'rgba(239,68,68,0.08)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:20, color:'#EF4444', fontFamily:"'Barlow',sans-serif", fontWeight:600, fontSize:12, cursor:'pointer' }}>
                          ■ Stop Speaking
                        </button>
                      )}

                      {messages.length > 0 && (
                        <button onClick={() => { setMessages([]); convRef.current = []; }}
                          style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:6, padding:'7px 14px', background:t.bgInput, border:`1px solid ${t.border}`, borderRadius:20, color:t.textMuted, fontFamily:"'Barlow',sans-serif", fontWeight:600, fontSize:12, cursor:'pointer' }}>
                          🗑️ Clear Chat
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              ) : (
                <SettingsPanel settings={settings} setSettings={setSettings} t={t} liveEvents={liveEvents} />
              )}
            </div>
          </div>

          {showGamePicker && (
            <GamePickerModal t={t}
              onSelect={name => { setDetectedGame(name); setShowGamePicker(false); }}
              onClose={() => setShowGamePicker(false)} />
          )}

          {showIntro && <LogoIntro onDone={handleIntroDone} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CasaGG));
  </script>
</body>
</html>
