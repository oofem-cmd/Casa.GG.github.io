<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CasaGG Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    .container {
      width: 100%; height: 100%;
      background: rgba(18, 20, 28, 0.93);
      border: 1px solid rgba(255, 107, 26, 0.45);
      border-radius: 14px;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 70px rgba(0,0,0,0.65), 0 0 32px rgba(255,107,26,0.07);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    /* Title bar — drag region */
    .titlebar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 13px 8px;
      border-bottom: 1px solid rgba(255,107,26,0.15);
      flex-shrink: 0;
      cursor: move;
    }
    .brand { display: flex; align-items: center; gap: 7px; }
    .logo-img { width: 22px; height: 22px; object-fit: contain; border-radius: 4px; }
    .logo-text { font-weight: 800; font-size: 13px; color: #FF6B1A; letter-spacing: 1px; }
    .logo-text span { color: #e8eaf0; }
    .live-badge {
      font-size: 8px; background: rgba(255,107,26,0.15);
      color: #FF6B1A; border: 1px solid rgba(255,107,26,0.3);
      border-radius: 20px; padding: 1px 6px;
      font-weight: 700; letter-spacing: 1px;
    }
    .game-badge {
      font-size: 9px; background: rgba(34,197,94,0.12);
      color: #22C55E; border: 1px solid rgba(34,197,94,0.3);
      border-radius: 20px; padding: 1px 8px;
      font-weight: 700; letter-spacing: 0.5px;
      max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .titlebar-actions { display: flex; gap: 5px; }
    .icon-btn {
      width: 21px; height: 21px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #888; cursor: pointer; font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: rgba(255,107,26,0.2); color: #FF6B1A; }

    /* Answer area */
    .answer-area {
      flex: 1; overflow-y: auto;
      padding: 10px 13px 6px;
      font-size: 12.5px; color: #c8cad8; line-height: 1.7;
    }
    .answer-area::-webkit-scrollbar { width: 4px; }
    .answer-area::-webkit-scrollbar-thumb { background: rgba(255,107,26,0.3); border-radius: 2px; }
    .placeholder { color: #444; font-style: italic; }
    .source-link {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; padding: 2px 10px;
      background: rgba(255,107,26,0.08); border: 1px solid rgba(255,107,26,0.25);
      border-radius: 20px; color: #FF6B1A; font-size: 10px;
      text-decoration: none; cursor: pointer;
    }
    .header-line { color: #FF6B1A; font-weight: 700; font-size: 13px; margin-top: 8px; display: block; }
    .bullet-line { padding-left: 12px; display: block; }
    .protip-line {
      padding: 6px 10px; background: rgba(255,107,26,0.08);
      border-left: 3px solid #FF6B1A; border-radius: 0 6px 6px 0;
      color: #aaa; font-size: 11.5px; margin-top: 6px; display: block;
    }

    /* Status bar */
    .status-bar {
      display: none; align-items: center; gap: 6px;
      padding: 4px 13px;
      background: rgba(255,107,26,0.08); border-top: 1px solid rgba(255,107,26,0.15);
      font-size: 10px; color: #FF6B1A; font-weight: 600; letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .status-bar.visible { display: flex; }
    .wave-bars { display: flex; gap: 2px; align-items: center; }
    .wave-bar { width: 3px; background: #FF6B1A; border-radius: 2px; animation: wave 0.7s ease-in-out infinite; }

    /* Live events panel */
    .events-panel {
      display: none; padding: 6px 13px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 10px; color: #667;
      flex-shrink: 0;
    }
    .events-panel.visible { display: block; }
    .event-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .event-key { color: #FF6B1A; font-family: 'DM Mono', monospace; overflow: hidden; text-overflow: ellipsis; max-width: 55%; white-space: nowrap; }
    .event-val { color: #667; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 45%; }

    /* Input row */
    .input-row {
      display: flex; gap: 7px; padding: 8px 10px 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .q-input {
      flex: 1; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 7px 11px; color: #e8eaf0;
      font-size: 12px; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .q-input:focus { border-color: rgba(255,107,26,0.5); }
    .q-input::placeholder { color: #555; }
    .ask-btn {
      padding: 7px 13px; background: #FF6B1A; border: none;
      border-radius: 8px; color: #fff; font-weight: 700; font-size: 11px;
      letter-spacing: 0.8px; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .ask-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .ask-btn:hover:not(:disabled) { opacity: 0.88; }
    .map-btn {
      padding: 7px 10px; background: rgba(255,107,26,0.15);
      border: 1px solid rgba(255,107,26,0.3); border-radius: 8px;
      color: #FF6B1A; font-size: 14px; cursor: pointer;
      transition: all 0.15s;
    }
    .map-btn:hover { background: rgba(255,107,26,0.25); }

    @keyframes wave { 0%,100%{height:3px} 50%{height:12px} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
  </style>
</head>
<body>
  <div class="container">
    <div class="titlebar" id="titlebar">
      <div class="brand">
        <img class="logo-img" src="./assets/casaorangegg.png" alt="Casa.GG" onerror="this.style.display='none'" />
        <span class="logo-text">Casa<span>.GG</span></span>
        <span class="live-badge">LIVE</span>
        <span class="game-badge" id="game-badge" style="display:none"></span>
      </div>
      <div class="titlebar-actions">
        <button class="icon-btn" title="Toggle live events" onclick="toggleEvents()">⚡</button>
        <button class="icon-btn" title="Close overlay" onclick="closeOverlay()">✕</button>
      </div>
    </div>

    <div class="answer-area" id="answer-area">
      <span class="placeholder">Say "Hey Casa" or ask below…</span>
    </div>

    <div class="events-panel" id="events-panel"></div>

    <div class="status-bar" id="status-bar">
      <div class="wave-bars">
        <div class="wave-bar" style="animation-delay:0s"></div>
        <div class="wave-bar" style="animation-delay:0.12s"></div>
        <div class="wave-bar" style="animation-delay:0.24s"></div>
        <div class="wave-bar" style="animation-delay:0.36s"></div>
        <div class="wave-bar" style="animation-delay:0.48s"></div>
      </div>
      <span id="status-text">Thinking…</span>
    </div>

    <div class="input-row">
      <input class="q-input" type="text" id="q-input" placeholder="Quick question…" autocomplete="off" />
      <button class="map-btn" title="Open live map" onclick="openMap()">🗺️</button>
      <button class="ask-btn" id="ask-btn" onclick="sendQuestion()">ASK</button>
    </div>
  </div>

  <script>
    'use strict';

    const answerArea = document.getElementById('answer-area');
    const statusBar  = document.getElementById('status-bar');
    const statusText = document.getElementById('status-text');
    const qInput     = document.getElementById('q-input');
    const askBtn     = document.getElementById('ask-btn');
    const evPanel    = document.getElementById('events-panel');
    const gameBadge  = document.getElementById('game-badge');

    let eventsVisible = false;
    let liveEvents    = {};
    let isDragging    = false;
    let dragOffX      = 0;
    let dragOffY      = 0;

    // ── Dragging via Overwolf window drag ─────────────────────────────
    const titlebar = document.getElementById('titlebar');
    titlebar.addEventListener('mousedown', e => {
      if (e.target.classList.contains('icon-btn') || e.target.closest('.icon-btn')) return;
      if (window.overwolf) {
        overwolf.windows.getCurrentWindow(result => {
          if (result.success) overwolf.windows.dragMove(result.window.id);
        });
      }
    });

    // ── Receive messages from background controller ────────────────────
    if (window.overwolf) {
      overwolf.windows.onMessageReceived.addListener(msg => {
        const type    = msg.id;
        const content = msg.content || {};

        switch (type) {
          case 'new-answer':
            hideStatus();
            renderAnswer(content.answer || '');
            break;
          case 'overlay-thinking':
            statusText.textContent = content.msg || 'Thinking…';
            statusBar.classList.add('visible');
            break;
          case 'game-event':
            (content.events || []).forEach(ev => {
              liveEvents[ev.name] = ev.data;
            });
            renderEvents();
            break;
          case 'game-launched':
            gameBadge.textContent = content.gameName || '';
            gameBadge.style.display = 'inline-block';
            break;
          case 'game-closed':
            gameBadge.style.display = 'none';
            liveEvents = {};
            renderEvents();
            break;
        }
      });
    }

    function hideStatus() { statusBar.classList.remove('visible'); }

    // ── Render answer ─────────────────────────────────────────────────
    function renderAnswer(text) {
      answerArea.innerHTML = '';
      const preview = text.substring(0, 600) + (text.length > 600 ? '…' : '');
      preview.split('\n').forEach(line => {
        if (!line.trim()) { answerArea.appendChild(document.createElement('br')); return; }
        if (/\[Source:/.test(line)) {
          const src = (line.match(/\[Source:\s*(.*?)\]/) || [])[1] || '#';
          const a = document.createElement('a');
          a.className = 'source-link';
          a.href = src.startsWith('http') ? src : '#';
          a.target = '_blank';
          a.textContent = '🔗 ' + src.replace(/^https?:\/\/(www\.)?/,'').substring(0, 55);
          answerArea.appendChild(a);
          return;
        }
        const el = document.createElement('span');
        el.style.display = 'block'; el.style.marginBottom = '3px';
        if (/^##?\s/.test(line)) {
          el.className = 'header-line'; el.textContent = line.replace(/^##?\s/, '');
        } else if (/^[-•]\s/.test(line)) {
          el.className = 'bullet-line'; el.textContent = '▸ ' + line.replace(/^[-•]\s/, '');
        } else if (/^💡|Pro Tip/.test(line)) {
          el.className = 'protip-line'; el.textContent = line;
        } else {
          el.textContent = line.replace(/\*\*/g,'').replace(/`/g,'');
        }
        answerArea.appendChild(el);
      });
      answerArea.scrollTop = answerArea.scrollHeight;
    }

    // ── Render live events ────────────────────────────────────────────
    function renderEvents() {
      evPanel.innerHTML = '';
      const keys = Object.keys(liveEvents).slice(0, 6);
      if (!keys.length) {
        evPanel.classList.remove('visible');
        return;
      }
      keys.forEach(k => {
        const row = document.createElement('div');
        row.className = 'event-row';
        const kEl = document.createElement('span');
        kEl.className = 'event-key'; kEl.textContent = k;
        const vEl = document.createElement('span');
        const raw = liveEvents[k];
        vEl.className = 'event-val';
        vEl.textContent = typeof raw === 'object' ? JSON.stringify(raw).slice(0,22) : String(raw).slice(0,22);
        row.appendChild(kEl); row.appendChild(vEl);
        evPanel.appendChild(row);
      });
      if (eventsVisible) evPanel.classList.add('visible');
    }

    function toggleEvents() {
      eventsVisible = !eventsVisible;
      evPanel.classList.toggle('visible', eventsVisible);
    }

    // ── Send question → relay to background → main ────────────────────
    function sendQuestion() {
      const q = qInput.value.trim();
      if (!q) return;
      askBtn.textContent = '…';
      askBtn.disabled    = true;
      statusText.textContent = 'Asking Casa…';
      statusBar.classList.add('visible');

      if (window.overwolf) {
        // Route question through background → main window
        try {
          overwolf.windows.getMainWindow().CasaBackground; // verify bg is accessible
          overwolf.windows.obtainDeclaredWindow('background', bgResult => {
            if (bgResult.success) {
              overwolf.windows.sendMessage(bgResult.window.id, 'overlay-ask', { question: q }, () => {});
            }
          });
        } catch (e) {
          overwolf.windows.obtainDeclaredWindow('background', bgResult => {
            if (bgResult.success) {
              overwolf.windows.sendMessage(bgResult.window.id, 'overlay-ask', { question: q }, () => {});
            }
          });
        }
      }

      qInput.value = '';
      setTimeout(() => { askBtn.textContent = 'ASK'; askBtn.disabled = false; }, 15000);
    }

    function closeOverlay() {
      if (window.overwolf) {
        overwolf.windows.getCurrentWindow(result => {
          if (result.success) overwolf.windows.hide(result.window.id, () => {});
        });
      }
    }

    function openMap() {
      if (window.overwolf) {
        try { overwolf.windows.getMainWindow().CasaBackground?.showMap(); }
        catch {
          overwolf.windows.obtainDeclaredWindow('map', result => {
            if (result.success) overwolf.windows.restore(result.window.id, () => {});
          });
        }
      }
    }

    // ── Keyboard ──────────────────────────────────────────────────────
    qInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendQuestion();
    });
  </script>
</body>
</html>
